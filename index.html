<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temporarily down</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fafafa;
      color: #222;
      text-align: center;
      line-height: 1.6;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      margin: 10px 0;
      font-size: 16px;
    }

    .cat {
      margin: 24px 0;
    }

    .cat img {
      width: 100%;
      height: auto;
      max-height: 70vh;
      object-fit: contain; /* full cat always visible */
      border-radius: 12px;
    }

    .caption {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    .box {
      margin-top: 20px;
      padding: 12px;
      border-radius: 10px;
      background: #f0f0f0;
      font-size: 15px;
    }

    strong {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">

    <h1>The app is down</h1>

    <p>
      It was running on my home server, but my cat chewed through
      the router’s power cable.
    </p>

    <div class="cat">
      <img src="cat.jpg" alt="The cat responsible">
      <div class="caption">
        The culprit. Zero regrets.
      </div>
    </div>

    <p>
      The cat is OK.
    </p>

    <div class="box">
      <p><strong>Expected back:</strong> 31.03.2026</p>
      <p><strong>Status:</strong> temporary outage</p>
    </div>

    <p>
      I’ll fix it once I’m back home and can replace the power supply.
    </p>

  </div>
</body>
</html>
